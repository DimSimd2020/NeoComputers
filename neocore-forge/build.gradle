plugins {
    id 'java-library'
    id 'net.neoforged.moddev' version '2.0.141'
}

version = '0.1.0'
group = 'com.vibecoder.neocomputers'

base {
    archivesName = 'neocomputers'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

sourceSets {
    main {
        java {
            srcDir '../panama-bridge/java'
        }
    }
}

neoForge {
    version = '21.0.167'

    runs {
        client {
            client()
        }

        server {
            server()
            programArgument '--nogui'
        }

        data {
            data()
            programArguments.addAll '--mod', 'neocomputers', '--all', '--output', file('src/generated/resources/').absolutePath, '--existing', file('src/main/resources/').absolutePath
        }

        configureEach {
            jvmArgument '--enable-native-access=ALL-UNNAMED'
            jvmArgument '--enable-preview'
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        neocomputers {
            sourceSet sourceSets.main
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
    options.compilerArgs.addAll(['--enable-preview'])
}

tasks.withType(JavaExec).configureEach {
    jvmArgs '--enable-native-access=ALL-UNNAMED', '--enable-preview'
}

tasks.withType(Test).configureEach {
    jvmArgs '--enable-native-access=ALL-UNNAMED', '--enable-preview'
}
